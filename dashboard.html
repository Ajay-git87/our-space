<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Our Space ❤️</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
min-height:100vh;
background:linear-gradient(135deg,#ff9a9e,#fad0c4,#fad0c4);
overflow-x:hidden;
color:white;
}

.navbar{
display:flex;
justify-content:center;
gap:20px;
padding:25px;
}

.navbar a{
text-decoration:none;
color:white;
font-weight:bold;
padding:12px 24px;
border-radius:30px;
background:rgba(255,255,255,0.15);
backdrop-filter:blur(10px);
transition:0.3s;
}

.navbar a:hover{
transform:translateY(-3px);
background:rgba(255,255,255,0.25);
}

.hero{
text-align:center;
padding:20px;
}

.hero h1{
font-size:4rem;
margin-bottom:10px;
text-shadow:0 0 20px rgba(255,255,255,0.5);
}

.hero p{
font-size:1.2rem;
opacity:0.9;
}

.container{
max-width:1200px;
margin:auto;
padding:20px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
gap:25px;
}

.card{
background:rgba(255,255,255,0.15);
backdrop-filter:blur(15px);
border-radius:25px;
padding:30px;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,0.15);
}

.card h2{
margin-bottom:20px;
}

.timer{
font-size:2rem;
font-weight:bold;
margin:10px 0;
}

.big{
font-size:3rem;
font-weight:bold;
}

.stats{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:15px;
margin-top:15px;
}

.stat{
background:rgba(255,255,255,0.15);
padding:15px;
border-radius:15px;
}

.label{
font-size:0.9rem;
opacity:0.8;
}

.value{
font-size:1.4rem;
font-weight:bold;
}

.heart{
position:fixed;
font-size:20px;
animation:float 10s linear infinite;
opacity:0.4;
pointer-events:none;
}

@keyframes float{
0%{
transform:translateY(100vh);
}
100%{
transform:translateY(-100px);
}
}
  .countdown{
display:flex;
justify-content:center;
gap:15px;
flex-wrap:wrap;
margin-top:30px;
}

.flip-box{
display:flex;
flex-direction:column;
align-items:center;
}

.flip-box div{
width:90px;
height:90px;

background:rgba(255,255,255,0.25);

backdrop-filter:blur(10px);

border-radius:20px;

display:flex;
justify-content:center;
align-items:center;

font-size:2rem;
font-weight:bold;

box-shadow:0 10px 25px rgba(0,0,0,0.15);

transition:0.4s ease;
}

.flip-box span{
margin-top:8px;
font-size:0.8rem;
letter-spacing:1px;
}

  .flip{
animation:flipAnim .5s ease;
}

@keyframes flipAnim{

0%{
transform:rotateX(0deg);
}

50%{
transform:rotateX(90deg);
}

100%{
transform:rotateX(0deg);
}

}
.counter-box{
width:120px;
text-align:center;
}

.roll-container{
height:90px;
overflow:hidden;
position:relative;
background:rgba(255,255,255,0.2);
backdrop-filter:blur(15px);
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,.15);
}

.roll-number{
font-size:3rem;
font-weight:700;
height:90px;
line-height:90px;
transition:transform .6s cubic-bezier(.22,1,.36,1);
}

.counter-label{
margin-top:10px;
font-size:.9rem;
letter-spacing:2px;
}  

</style>
</head>

<body>

<nav class="navbar">
<a href="index.html">🏠 Home</a>
<a href="Letters.html">💌 Letters</a>
<a href="gallery.html">📸 Gallery</a>
</nav>

<div class="hero">
<h1>❤️ Our Space ❤️</h1>
<p>Since 27 August 2025</p>
</div>

<div class="container">

<div class="card">
<h2>💞 Time Together</h2>

<div class="timer" id="liveTimer">
Loading...
</div>

<div class="stats">
<div class="stat">
<div class="label">Years</div>
<div class="value" id="years">0</div>
</div>

<div class="stat">
<div class="label">Months</div>
<div class="value" id="months">0</div>
</div>

<div class="stat">
<div class="label">Days</div>
<div class="value" id="days">0</div>
</div>

<div class="stat">
<div class="label">Hours</div>
<div class="value" id="hours">0</div>
</div>
</div>
</div>

<div class="card">

<h2>🎉 Next Anniversary</h2>

<div class="big" id="nextDate">
27/08/2026
</div>

<br>

<div class="countdown">

<div class="counter-box">
<div class="roll-container">
<div class="roll-number" id="daysRoll">0</div>
</div>
<div class="counter-label">DAYS</div>
</div>

<div class="counter-box">
<div class="roll-container">
<div class="roll-number" id="hoursRoll">0</div>
</div>
<div class="counter-label">HOURS</div>
</div>

<div class="counter-box">
<div class="roll-container">
<div class="roll-number" id="minutesRoll">0</div>
</div>
<div class="counter-label">MINUTES</div>
</div>

<div class="counter-box">
<div class="roll-container">
<div class="roll-number" id="secondsRoll">0</div>
</div>
<div class="counter-label">SECONDS</div>
</div>

</div>

<div class="card">

<h2>📊 Relationship Stats</h2>

<div class="stats">

<div class="stat">
<div class="label">Total Days</div>
<div class="value" id="totalDays"></div>
</div>

<div class="stat">
<div class="label">Total Hours</div>
<div class="value" id="totalHours"></div>
</div>

<div class="stat">
<div class="label">Total Minutes</div>
<div class="value" id="totalMinutes"></div>
</div>

<div class="stat">
<div class="label">Total Seconds</div>
<div class="value" id="totalSeconds"></div>
</div>

</div>

</div>

</div>

<script>

const startDate = new Date("2025-08-27T00:00:00");

function updateCounters(){

const now = new Date();

let years = now.getFullYear() - startDate.getFullYear();
let months = now.getMonth() - startDate.getMonth();
let days = now.getDate() - startDate.getDate();

if(days < 0){
months--;
days += new Date(now.getFullYear(), now.getMonth(), 0).getDate();
}

if(months < 0){
years--;
months += 12;
}

const diff = now - startDate;

const totalSeconds = Math.floor(diff/1000);
const totalMinutes = Math.floor(totalSeconds/60);
const totalHours = Math.floor(totalMinutes/60);
const totalDays = Math.floor(totalHours/24);

document.getElementById("years").innerText = years;
document.getElementById("months").innerText = months;
document.getElementById("days").innerText = days;
document.getElementById("hours").innerText = totalHours;

document.getElementById("totalDays").innerText = totalDays;
document.getElementById("totalHours").innerText = totalHours;
document.getElementById("totalMinutes").innerText = totalMinutes;
document.getElementById("totalSeconds").innerText = totalSeconds;

document.getElementById("liveTimer").innerText =
`${years}Y ${months}M ${days}D`;

let nextYear = now.getFullYear();

if(
now.getMonth()>7 ||
(now.getMonth()==7 && now.getDate()>=27)
){
nextYear++;
}

const nextAnniversary =
new Date(nextYear,7,27);

document.getElementById("nextDate").innerText =
nextAnniversary.toLocaleDateString("en-GB");

const countdown = nextAnniversary - now;

const d = Math.floor(countdown/(1000*60*60*24));
const h = Math.floor((countdown%(1000*60*60*24))/(1000*60*60));
const m = Math.floor((countdown%(1000*60*60))/(1000*60));
const s = Math.floor((countdown%(1000*60))/1000);

rollDigit("daysRoll",d);
rollDigit("hoursRoll",h);
rollDigit("minutesRoll",m);
rollDigit("secondsRoll",s);
}
function updateBox(id,value){

const box=document.getElementById(id);

if(box.innerText != value){

box.classList.remove("flip");

void box.offsetWidth;

box.classList.add("flip");

box.innerText=value;

}

}
setInterval(updateCounters,1000);
updateCounters();

function createHeart(){

const heart=document.createElement('div');

heart.classList.add('heart');
heart.innerHTML='❤️';

heart.style.left=Math.random()*100+'vw';
heart.style.fontSize=(Math.random()*20+15)+'px';

document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},10000);

}

setInterval(createHeart,1200);

  function rollDigit(id,value){

const el=document.getElementById(id);

if(el.dataset.oldValue==value) return;

el.dataset.oldValue=value;

el.style.transform="translateY(-100%)";

setTimeout(()=>{

el.innerHTML=value;

el.style.transition="none";
el.style.transform="translateY(100%)";

requestAnimationFrame(()=>{

el.style.transition=
"transform .6s cubic-bezier(.22,1,.36,1)";

el.style.transform="translateY(0%)";

});

},300);

}

</script>

</body>
</html>

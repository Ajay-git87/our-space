<!DOCTYPE html>
<html>
<head>
<title>Gallery ❤️</title>

<style>
body{
font-family:Arial;
background:#111;
color:white;
text-align:center;
padding:30px;
}

.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.gallery img{
width:100%;
border-radius:15px;
}
</style>

</head>

<body>

<h1>📸 Our Memories</h1>

<div class="gallery">

<img src="photos/photo1.jpg">
<img src="photos/photo2.jpg">

</div>

</body>
</html>
